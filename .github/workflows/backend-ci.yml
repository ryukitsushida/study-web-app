name: Backend CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.paths.outputs.backend }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for backend changes
        uses: dorny/paths-filter@v3
        id: paths
        with:
          filters: |
            backend:
              - "backend/**"
              - ".github/workflows/backend-ci.yml"

  lint-and-test:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.backend_changed == 'true'

    defaults:
      run:
        working-directory: ./backend/fastapi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/fastapi/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Ruff lint
        run: ruff check .

      - name: Run Ruff format check
        run: ruff format --check .

      - name: Run tests
        run: python -m pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: [check, lint-and-test]
    if: needs.check.outputs.backend_changed == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/fastapi
          file: ./backend/fastapi/Dockerfile
          push: false
          tags: study-web-app-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
