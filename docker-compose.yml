services:
  api:
    build:
      context: ./backend/fastapi
      dockerfile: Dockerfile
    profiles:
      - fastapi
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/todo_db
      - ENABLE_RELOAD=true
    volumes:
      - ./backend/fastapi/app:/app/app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  api-springboot:
    build:
      context: ./backend/springboot
      dockerfile: Dockerfile
    profiles:
      - springboot
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=jdbc:postgresql://db:5432/todo_db
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=todo_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
